# Bygger spelet och publicerar till GitHub Pages.
# configure-pages med enablement: true aktiverar Pages automatiskt
# (Source: GitHub Actions) första gången workflowen körs.
name: Publicera till GitHub Pages

on:
  push:
    branches: [main, claude/swedish-language-it48na]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Poly Haven-texturer och exakt sjö-/väggeometri från OSM – bygget
      # klarar sig med reservtexturer om nedladdningen skulle fallera.
      - run: npm run setup || true
      - run: npm run setup:map || true
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
