# Bygger spelet och publicerar till GitHub Pages via gh-pages-grenen
# (Pages aktiverades automatiskt när grenen först pushades). I CI hämtas
# dessutom Poly Haven-texturer och exakt sjö-/väggeometri från OSM.
name: Publicera till GitHub Pages

on:
  push:
    branches: [main, claude/swedish-language-it48na]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Bygget klarar sig med reservtexturer om nedladdningen skulle fallera
      - run: npm run setup || true
      - run: npm run setup:map || true
      - run: npm run build
      - name: Publicera dist till gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publicera till GitHub Pages (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
